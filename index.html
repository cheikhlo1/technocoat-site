<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion de Production - Technocoat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Gestion Production</h1>
        <p>Technocoat - Pilotage atelier</p>
      </div>
      <nav class="sidebar-nav" aria-label="Navigation principale">
        <button data-section="manager">Manager</button>
        <button data-section="production">Production / OF</button>
        <button data-section="responsable-methode">Responsable méthode</button>
        <button data-section="preparation">Préparation</button>
        <button data-section="accroche">Accroche</button>
        <button data-section="peinture">Peinture</button>
        <button data-section="decroche">Décroche</button>
        <button data-section="qualite">Qualité</button>
        <button data-section="logistique">Logistique</button>
        <button data-section="stock">Stock</button>
        <button data-section="base-donnees">Base de données</button>
        <button data-section="parametres">Paramètres / Utilisateurs</button>
      </nav>
    </aside>

    <main class="main-content">
      <header class="top-header">
        <div class="user-panel">
          <span><strong>Utilisateur :</strong> John Doe</span>
          <span><strong>Rôle :</strong> Manager</span>
          <button id="change-role" type="button">Changer rôle</button>
        </div>
      </header>

      <section id="page-content" class="page-content" aria-live="polite"></section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
